<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Isaac Ayo - Linktree</title>
</head>
<style>
	* { box-sizing: border-box; 
		margin: 0;
		padding: 0;
	}

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      min-height: 100vh;
    }

    .page {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .share-btn {
      align-self: flex-end;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px dashed #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 24px;
      background: none;
      color: #999;
    }

    .share-btn svg {
      width: 18px;
      height: 18px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 14px;
      background: #eee;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .username {
      font-size: 17px;
      font-weight: 600;
      color: #111;
      margin-bottom: 32px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      width: 100%;
      padding: 18px 24px;
      background: #f2f2f2;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      color: #222;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      transition: background 0.15s, transform 0.1s;
    }

    .link-btn:hover { background: #e6e6e6; transform: scale(1.01); }
    .link-btn:active { transform: scale(0.99); }
</style>
<body>


	<div class="page">

    <!-- Share button -->
    <button class="share-btn" title="Share">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/>
        <circle cx="6" cy="12" r="3"/>
        <circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </button>

    <!-- Avatar -->
    <div class="avatar">
      <img src="img/pp.jpg" alt="Isaac Ayo avatar" />
    </div>

    <!-- Username -->
    <div class="username">Isaac Ayo</div>

    <!-- Links -->
    <div class="links">
    	<a href="https://isaacayocode.netlify.app/" class="link-btn">Portfolio</a>
      <a href="https://x.com/Isaac_Ayo_1" class="link-btn">Twitter</a>
      <a href="https://www.instagram.com/isaacayo_1/" class="link-btn">Instagram</a>
      <a href="https://www.linkedin.com/in/isaac-ayobami-64281b297/" class="link-btn">Linkedin</a>
      <a href="https://github.com/IsaacAyo1" class="link-btn">Github</a>
    </div>

  </div>

</body>
</html>
